# =============================================================================
# OSINT Platform - Staging Deployment (Railway)
# =============================================================================
# Auto-deploys to Railway staging environment on merge to main
# =============================================================================

name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual triggers

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy Backend to Railway
        run: |
          railway link --environment staging
          railway up --service backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy Frontend to Railway
        run: |
          railway link --environment staging
          railway up --service frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy-backend.result }}" == "success" ] && [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
            echo "✅ Staging deployment successful!"
            echo "Backend: https://api.osint-platform.railway.app"
            echo "Frontend: https://osint-platform.railway.app"
          else
            echo "❌ Staging deployment failed!"
            exit 1
          fi
