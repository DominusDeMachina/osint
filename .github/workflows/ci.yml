# =============================================================================
# OSINT Platform - CI Pipeline
# =============================================================================
# Runs on every pull request and push to main
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  RUST_VERSION: '1.85'

jobs:
  # ===========================================================================
  # Lint and Type Check
  # ===========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: |
          cd backend
          uv sync --dev

      - name: Run Ruff (Python linting)
        run: |
          cd backend
          uv run ruff check .

      - name: Run mypy (Python type checking)
        run: |
          cd backend
          uv run mypy app/ --ignore-missing-imports

      # Rust setup
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            graph-engine/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Run cargo fmt (Rust formatting)
        run: |
          cd graph-engine
          cargo fmt --all -- --check

      - name: Run cargo clippy (Rust linting)
        run: |
          cd graph-engine
          cargo clippy -- -D warnings

      # Node.js setup
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install Node.js dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Run ESLint (TypeScript linting)
        run: |
          cd frontend
          pnpm lint

      - name: Run TypeScript type check
        run: |
          cd frontend
          pnpm typecheck

  # ===========================================================================
  # Security Scanning
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Python security
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: Python dependency audit (pip-audit)
        run: |
          cd backend
          pip freeze > requirements.txt
          pip-audit -r requirements.txt || true
          rm requirements.txt

      - name: Python SAST (bandit)
        run: |
          cd backend
          bandit -r app/ -ll -ii

      # Rust security
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust dependency audit
        run: |
          cd graph-engine
          cargo audit || true
        continue-on-error: true

      # Node.js security
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Node dependency audit
        run: |
          cd frontend
          pnpm audit --audit-level=high || true
        continue-on-error: true

  # ===========================================================================
  # Unit Tests
  # ===========================================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: osint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            graph-engine/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install maturin
        run: pip install maturin

      - name: Build and install graph-engine
        run: |
          cd graph-engine
          maturin build --release --out dist
          pip install dist/*.whl

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: |
          cd backend
          uv sync --dev

      - name: Run database migrations
        env:
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/osint_test
        run: |
          cd backend
          uv run alembic upgrade head

      - name: Create RLS test user
        run: |  # pragma: allowlist secret
          PGPASSWORD=postgres psql -h localhost -U postgres -d osint_test <<EOF
          -- Create osint_app user with NOBYPASSRLS for RLS testing
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'osint_app') THEN
              CREATE ROLE osint_app WITH LOGIN PASSWORD 'osint_app' NOBYPASSRLS;
            END IF;
          END
          \$\$;

          -- Grant permissions on all tables
          GRANT USAGE ON SCHEMA public TO osint_app;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO osint_app;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO osint_app;

          -- Set default privileges for future tables
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO osint_app;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO osint_app;
          EOF

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/osint_test
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/osint_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          uv run pytest -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true

  test-graph-engine:
    name: Graph Engine Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            graph-engine/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Run cargo test
        run: |
          cd graph-engine
          cargo test --verbose

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Run vitest
        run: |
          cd frontend
          pnpm test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: frontend/coverage/coverage-final.json
          flags: frontend
        continue-on-error: true

  # ===========================================================================
  # Build Artifacts
  # ===========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-graph-engine, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            graph-engine/target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install maturin
        run: pip install maturin

      - name: Build graph-engine wheel
        run: |
          cd graph-engine
          maturin build --release --out dist

      - name: Upload graph-engine wheel
        uses: actions/upload-artifact@v7
        with:
          name: graph-engine-wheel
          path: graph-engine/dist/*.whl

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd frontend
          pnpm build

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
